</head>

<body>

    <!-- Navigation -->
    <div class="toplink">
        <a href="index.html">Home</a> &#65372;
        <a href="about.html">About</a> &#65372;

    <!-- Banner -->
    <header class="toplink-banner">
        <h1>Welcome to Travel Sign Up Page</h1>
        <p>Join us today and be part of our amazing community!</p>
    </header>

    <!-- Content -->
    <main class="row">
        <div class="content">

            <h1>Sign Up</h1>

            <!-- FIXED FORM (redirect added here) -->
            <form action="success.html" method="get" id="signup-form" class="authForm">

                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required><br><br>

                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>

                <input type="submit" value="Sign Up">

            </form>

        </div>
    </main>

</body>
</html>
